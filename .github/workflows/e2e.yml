name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Installa le dipendenze
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      # I test E2E sono offline: nessun segreto reale, solo uno stub con i nomi esportati
      # richiesti a import-time (hubIpc, hubAttachments) per evitare MODULE_NOT_FOUND.
      - name: Stub cloudCredentials.ts
        shell: bash
        run: |
          cat <<'EOF' > src/main/ipc/cloudCredentials.ts
          export const GOOGLE_CLIENT_ID = "";
          export const GOOGLE_CLIENT_SECRET = "";
          export const GOOGLE_API_KEY = "";
          export const MS_CLIENT_ID = "";
          export const PUSHER_KEY = "";
          export const PUSHER_CLUSTER = "";
          export const PUSHER_WEBHOOK = "";
          export const HUB_URL = "";
          export const HUB_CREATE_SECRET = "";
          EOF

      - name: Build (CSS + TS)
        run: |
          npm run build-css
          npm run build-ts

      - name: Esegui i test E2E
        run: npx playwright test
        env:
          CI: "true"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Carica report in caso di fallimento
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
